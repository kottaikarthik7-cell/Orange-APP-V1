# Production-ish compose: one server container, one nginx+client container.
# SQLite + uploads live in a named volume so they survive `docker compose up`.
#
# Usage:
#   cp server/.env.example server/.env   # set JWT_SECRET, CLIENT_ORIGIN, etc.
#   docker compose up --build
#
# Then hit http://localhost:8080 in a browser. First run seeds the demo data.

services:
  server:
    build: ./server
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/orange.db
      - UPLOAD_DIR=/app/data/uploads
      - PORT=4000
      - CLIENT_ORIGIN=http://localhost:8080
    volumes:
      - orange-data:/app/data
    expose:
      - "4000"
    command: >
      sh -c "node src/seed.js && node src/index.js"
    restart: unless-stopped

  client:
    build: ./client
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  orange-data:
