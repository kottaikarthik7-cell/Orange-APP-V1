# Render.com Blueprint — one-click deploy of the full stack.
#
# Step 1:  Put this project on GitHub (any public repo).
# Step 2:  Go to https://render.com/deploy?repo=<your-repo-url>
# Step 3:  Click "Apply Blueprint". Render creates two services.
# Step 4:  Share the client URL with anyone — they can use the app live.

services:
  - type: web
    name: orange-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && node src/seed.js
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /tmp/orange.db
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: orange-client
          property: host
    # NOTE: Render's free tier does not allow persistent disks, so the SQLite
    # DB lives in /tmp and is wiped on every redeploy (and when the free-tier
    # service sleeps after 15 min of inactivity). The seed script runs at build
    # time so the demo data is always there. To keep real user data, upgrade
    # to the "starter" plan ($7/mo) and add a `disk:` block pointing at
    # /opt/render/project/src/data (and change DB_PATH / UPLOAD_DIR back).

  - type: web
    name: orange-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: orange-server
          property: host
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: orange-server
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
